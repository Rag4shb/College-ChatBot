{% extends "base.html" %}
{% load static %}
{% block content %}

<!-- Font Awesome 6 + Google Fonts -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">

<style>
/* ========== THEME VARIABLES ========== */
:root {
    --gallery-bg: #f8fafc;
    --gallery-card-bg: #ffffff;
    --gallery-text: #1e293b;
    --gallery-text-secondary: #64748b;
    --gallery-accent: #6366f1;
    --gallery-border: #e2e8f0;
    --gallery-shadow: 0 1px 3px rgba(0,0,0,0.05);
    --gallery-shadow-hover: 0 8px 20px rgba(0,0,0,0.08);
    --gallery-overlay: rgba(0, 0, 0, 0.9);
}

[data-theme="dark"],
.dark-mode,
body.dark {
    --gallery-bg: #0f172a;
    --gallery-card-bg: #1e293b;
    --gallery-text: #f1f5f9;
    --gallery-text-secondary: #94a3b8;
    --gallery-accent: #818cf8;
    --gallery-border: #334155;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: var(--gallery-bg);
    color: var(--gallery-text);
}

/* Clean Header */
.gallery-header {
    margin-bottom: 1.5rem;
    padding: 0.5rem 0;
}

.gallery-header h1 {
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--gallery-accent), #a855f7);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
}

.gallery-header p {
    color: var(--gallery-text-secondary);
    font-size: 0.85rem;
    margin-top: 0.25rem;
}

/* Album Tabs - Compact */
.album-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1.25rem;
    border-bottom: 1px solid var(--gallery-border);
    padding-bottom: 0.75rem;
}

.album-tab {
    background: transparent;
    border: none;
    padding: 0.5rem 1.2rem;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    color: var(--gallery-text-secondary);
    border-radius: 40px;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 8px;
}

.album-tab i {
    font-size: 0.85rem;
}

.album-tab:hover {
    color: var(--gallery-accent);
    background: rgba(99, 102, 241, 0.08);
}

.album-tab.active {
    color: var(--gallery-accent);
    background: rgba(99, 102, 241, 0.12);
}

/* Stats Chip - Compact */
.stats-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--gallery-card-bg);
    border: 1px solid var(--gallery-border);
    border-radius: 30px;
    padding: 0.25rem 0.9rem;
    font-size: 0.7rem;
    font-weight: 500;
    margin-bottom: 1rem;
}

/* Album Grid - Tight, Clean */
.album-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 1rem;
}

/* Album Item - Minimal */
.album-item {
    background: var(--gallery-card-bg);
    border-radius: 1rem;
    overflow: hidden;
    border: 1px solid var(--gallery-border);
    transition: all 0.25s ease;
    cursor: pointer;
}

.album-item:hover {
    transform: translateY(-2px);
    box-shadow: var(--gallery-shadow-hover);
    border-color: var(--gallery-accent);
}

.image-container {
    position: relative;
    overflow: hidden;
    aspect-ratio: 1 / 1;
    background: #f1f5f9;
}

.image-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s ease;
}

.album-item:hover .image-container img {
    transform: scale(1.03);
}

.image-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
}

.album-item:hover .image-overlay {
    opacity: 1;
}

.overlay-icon {
    background: rgba(0,0,0,0.7);
    border-radius: 30px;
    padding: 4px 10px;
    font-size: 0.7rem;
    color: white;
}

.album-info {
    padding: 0.6rem 0.7rem 0.7rem;
}

.album-info h4 {
    font-size: 0.8rem;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--gallery-text);
}

.album-info p {
    font-size: 0.65rem;
    color: var(--gallery-text-secondary);
    margin-top: 0.2rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

/* Empty State */
.empty-album {
    text-align: center;
    padding: 2rem;
    background: var(--gallery-card-bg);
    border-radius: 1rem;
    border: 1px solid var(--gallery-border);
    color: var(--gallery-text-secondary);
    font-size: 0.85rem;
}

.empty-album i {
    font-size: 2rem;
    margin-bottom: 0.5rem;
    opacity: 0.5;
}

/* Lightbox - Clean */
.lightbox {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: var(--gallery-overlay);
    backdrop-filter: blur(12px);
    z-index: 1040;
    display: flex;
    align-items: center;
    justify-content: center;
    visibility: hidden;
    opacity: 0;
    transition: 0.2s;
    pointer-events: none;
}

.lightbox.active {
    visibility: visible;
    opacity: 1;
    pointer-events: auto;
}

.lightbox-content {
    max-width: 85vw;
    max-height: 80vh;
    position: relative;
}

.lightbox-content img {
    max-width: 100%;
    max-height: 75vh;
    object-fit: contain;
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

.lb-caption {
    position: absolute;
    bottom: -35px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    padding: 0.3rem 1rem;
    border-radius: 40px;
    color: white;
    font-size: 0.7rem;
    white-space: nowrap;
}

.lb-close {
    position: absolute;
    top: -12px;
    right: -12px;
    background: rgba(0,0,0,0.6);
    border-radius: 50%;
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    cursor: pointer;
    color: white;
}

.lb-close:hover {
    background: #ef4444;
}

.lb-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.5);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    cursor: pointer;
    color: white;
    transition: 0.2s;
}

.lb-nav.prev {
    left: -45px;
}

.lb-nav.next {
    right: -45px;
}

.lb-nav:hover {
    background: var(--gallery-accent);
}

@media (max-width: 640px) {
    .album-grid {
        grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
        gap: 0.75rem;
    }
    .lb-nav.prev { left: 5px; }
    .lb-nav.next { right: 5px; }
    .lb-close { top: 5px; right: 5px; }
    .lb-caption { bottom: -30px; font-size: 0.6rem; white-space: nowrap; }
    .album-tab { padding: 0.4rem 1rem; font-size: 0.75rem; }
}

.footer-note {
    text-align: center;
    margin-top: 1.5rem;
    padding: 0.75rem;
    font-size: 0.65rem;
    color: var(--gallery-text-secondary);
    border-top: 1px solid var(--gallery-border);
}
</style>

<div class="container py-3">
    <!-- Simple Header -->
    <div class="gallery-header">
        <h1><i class="fas fa-images"></i> Gallery</h1>
        <p>Moments from campus • Events • Academics • Sports</p>
    </div>

    <!-- Album Tabs -->
    <div class="album-tabs">
        <div class="album-tab active" data-album="campus"><i class="fas fa-tree"></i> Campus</div>
        <div class="album-tab" data-album="events"><i class="fas fa-calendar-alt"></i> Events</div>
        <div class="album-tab" data-album="academics"><i class="fas fa-chalkboard-user"></i> Academics</div>
        <div class="album-tab" data-album="sports"><i class="fas fa-futbol"></i> Sports</div>
    </div>

    <!-- Stats -->
    <div class="stats-chip" id="albumStats">
        <i class="fas fa-camera"></i> <span id="photoCount">0</span> photos
    </div>

    <!-- Album Grid -->
    <div id="albumGrid" class="album-grid"></div>
    
    <div class="footer-note">
        <i class="fas fa-hand-point-up"></i> Click photo to view fullscreen • 
        <i class="fas fa-arrow-left"></i> <i class="fas fa-arrow-right"></i> Navigate
    </div>
</div>

<!-- Lightbox -->
<div id="lightbox" class="lightbox">
    <div class="lightbox-content">
        <img id="lbImage" src="" alt="">
        <div class="lb-caption" id="lbCaption"></div>
        <div class="lb-close" id="closeLb"><i class="fas fa-times"></i></div>
        <div class="lb-nav prev" id="prevBtn"><i class="fas fa-chevron-left"></i></div>
        <div class="lb-nav next" id="nextBtn"><i class="fas fa-chevron-right"></i></div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Album Data
    const albums = {
        campus: {
            name: "Campus",
            photos: [
                { src: "http://clesbedcollege.org/sites/default/files/2021-10/Jagadeesh-Kavatagimath.jpg", title: "Shri Jagadeesh Kavatagimath", sub: "Secretary" },
                { src: "https://images.pexels.com/photos/207691/pexels-photo-207691.jpeg?auto=compress&cs=tinysrgb&w=500", title: "Green Walkway", sub: "Eco-friendly campus" },
                { src: "https://images.pexels.com/photos/256490/pexels-photo-256490.jpeg?auto=compress&cs=tinysrgb&w=500", title: "Main Building", sub: "Architectural excellence" },
                { src: "https://images.pexels.com/photos/2387793/pexels-photo-2387793.jpeg?auto=compress&cs=tinysrgb&w=500", title: "Central Library", sub: "Knowledge hub" },
                { src: "https://images.pexels.com/photos/159775/outdoor-school-education-learning-159775.jpeg?auto=compress&cs=tinysrgb&w=500", title: "Amphitheater", sub: "Open air events" }
            ]
        },
        events: {
            name: "Events",
            photos: [
                { src: "https://i.ibb.co/BHW9tPmy/Whats-App-Image-2026-03-05-at-10-11-19-AM.jpg", title: "Annual Fest 2025", sub: "Cultural celebration" },
                { src: "https://images.pexels.com/photos/5212341/pexels-photo-5212341.jpeg?auto=compress&cs=tinysrgb&w=500", title: "Tech Symposium", sub: "Project exhibition" },
                { src: "https://images.pexels.com/photos/5900169/pexels-photo-5900169.jpeg?auto=compress&cs=tinysrgb&w=500", title: "Alumni Meet", sub: "Legacy gathering" },
                { src: "https://images.pexels.com/photos/841130/pexels-photo-841130.jpeg?auto=compress&cs=tinysrgb&w=500", title: "Robotics Comp", sub: "Innovation showcase" }
            ]
        },
        academics: {
            name: "Academics",
            photos: [
                { src: "https://images.pexels.com/photos/256490/pexels-photo-256490.jpeg?auto=compress&cs=tinysrgb&w=500", title: "Smart Classroom", sub: "Digital learning" },
                { src: "https://images.pexels.com/photos/2387793/pexels-photo-2387793.jpeg?auto=compress&cs=tinysrgb&w=500", title: "Library", sub: "Silent study" },
                { src: "https://images.pexels.com/photos/841130/pexels-photo-841130.jpeg?auto=compress&cs=tinysrgb&w=500", title: "Robotics Lab", sub: "Hands-on learning" },
                { src: "https://images.pexels.com/photos/159775/outdoor-school-education-learning-159775.jpeg?auto=compress&cs=tinysrgb&w=500", title: "Outdoor Class", sub: "Nature integrated" }
            ]
        },
        sports: {
            name: "Sports",
            photos: [
                { src: "https://images.pexels.com/photos/267885/pexels-photo-267885.jpeg?auto=compress&cs=tinysrgb&w=500", title: "Cricket Ground", sub: "Annual meet" },
                { src: "https://images.pexels.com/photos/207691/pexels-photo-207691.jpeg?auto=compress&cs=tinysrgb&w=500", title: "Football Arena", sub: "Tournament" },
                { src: "https://images.pexels.com/photos/841130/pexels-photo-841130.jpeg?auto=compress&cs=tinysrgb&w=500", title: "Basketball", sub: "Practice session" },
                { src: "https://images.pexels.com/photos/5212341/pexels-photo-5212341.jpeg?auto=compress&cs=tinysrgb&w=500", title: "Athletics", sub: "Track events" }
            ]
        }
    };

    let currentAlbum = "campus";
    let currentPhotos = [];
    let currentIndex = 0;

    const gridContainer = document.getElementById('albumGrid');
    const lightbox = document.getElementById('lightbox');
    const lbImage = document.getElementById('lbImage');
    const lbCaption = document.getElementById('lbCaption');
    const photoCountSpan = document.getElementById('photoCount');

    function renderAlbum(albumId) {
        const album = albums[albumId];
        if (!album) return;
        
        currentPhotos = album.photos;
        photoCountSpan.innerText = currentPhotos.length;

        if (currentPhotos.length === 0) {
            gridContainer.innerHTML = `<div class="empty-album"><i class="fas fa-images"></i><br>No photos in this album</div>`;
            return;
        }

        gridContainer.innerHTML = currentPhotos.map((photo, idx) => `
            <div class="album-item" data-index="${idx}">
                <div class="image-container">
                    <img src="${photo.src}" alt="${photo.title}" loading="lazy" onerror="this.src='https://placehold.co/400x400/6366f1/white?text=Image'">
                    <div class="image-overlay">
                        <div class="overlay-icon"><i class="fas fa-expand"></i></div>
                    </div>
                </div>
                <div class="album-info">
                    <h4>${escapeHtml(photo.title)}</h4>
                    <p>${escapeHtml(photo.sub)}</p>
                </div>
            </div>
        `).join('');

        // Attach click events
        document.querySelectorAll('.album-item').forEach(item => {
            item.addEventListener('click', () => {
                const idx = parseInt(item.getAttribute('data-index'));
                openLightbox(idx);
            });
        });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }

    function openLightbox(index) {
        if (!currentPhotos[index]) return;
        currentIndex = index;
        const photo = currentPhotos[currentIndex];
        lbImage.src = photo.src;
        lbCaption.innerHTML = `${photo.title} — ${photo.sub}`;
        lightbox.classList.add('active');
    }

    function closeLightbox() {
        lightbox.classList.remove('active');
    }

    function nextPhoto() {
        let newIdx = currentIndex + 1;
        if (newIdx >= currentPhotos.length) newIdx = 0;
        currentIndex = newIdx;
        const photo = currentPhotos[currentIndex];
        lbImage.src = photo.src;
        lbCaption.innerHTML = `${photo.title} — ${photo.sub}`;
    }

    function prevPhoto() {
        let newIdx = currentIndex - 1;
        if (newIdx < 0) newIdx = currentPhotos.length - 1;
        currentIndex = newIdx;
        const photo = currentPhotos[currentIndex];
        lbImage.src = photo.src;
        lbCaption.innerHTML = `${photo.title} — ${photo.sub}`;
    }

    // Tab switching
    document.querySelectorAll('.album-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            const albumId = tab.getAttribute('data-album');
            if (albumId === currentAlbum) return;
            
            currentAlbum = albumId;
            
            document.querySelectorAll('.album-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            
            renderAlbum(albumId);
        });
    });

    // Lightbox events
    document.getElementById('closeLb').addEventListener('click', closeLightbox);
    document.getElementById('prevBtn').addEventListener('click', prevPhoto);
    document.getElementById('nextBtn').addEventListener('click', nextPhoto);
    
    lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox) closeLightbox();
    });

    // Keyboard
    document.addEventListener('keydown', (e) => {
        if (!lightbox.classList.contains('active')) return;
        if (e.key === 'ArrowRight') nextPhoto();
        if (e.key === 'ArrowLeft') prevPhoto();
        if (e.key === 'Escape') closeLightbox();
    });

    // Theme sync with base template
    function syncTheme() {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark' ||
                      document.body.classList.contains('dark') ||
                      localStorage.getItem('theme') === 'dark';
        if (isDark) {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.body.classList.add('dark');
        }
    }
    
    syncTheme();
    renderAlbum('campus');
});
</script>

{% endblock %}
