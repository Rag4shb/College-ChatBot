{% extends "base.html" %}
{% load static %}
{% block content %}

<style>
/* Gallery Card */
.gallery-card{
  background:var(--card-bg);
  color:var(--text);
  border-radius:30px;
  padding:40px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

/* Title */
.gallery-title{
  font-size:32px;
  font-weight:700;
  text-align:center;
  margin-bottom:40px;
}

/* Grid */
.gallery-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:30px;
}

/* Gallery Item */
.gallery-item{
  display:flex;
  flex-direction:column;
  gap:12px; /* GAP BETWEEN IMAGE & CAPTION */
}

/* Image Box */
.gallery-img-box{
  overflow:hidden;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

/* Image */
.gallery-img-box img{
  width:100%;
  height:220px;
  object-fit:cover;
  transition:transform 0.5s ease;
}

/* Zoom Effect */
.gallery-img-box:hover img{
  transform:scale(1.1);
}

/* Caption Box */
.gallery-caption-box{
  background:#000000;
  padding:12px;
  border-radius:10px;
  text-align:center;
  font-weight:600;
  box-shadow:0 3px 8px rgba(0, 0, 0, 0.08);
}

/* Cursor for clickable images */
.gallery-clickable {
  cursor: pointer;
}

/* Modal theme for dark/light mode */
.modal-theme {
  background-color: var(--card-bg) !important;
  color: var(--text) !important;
}

/* Close button color in dark mode */
[data-theme="dark"] .modal-theme .btn-close {
  filter: invert(1); /* Makes the close button white in dark mode */
}

/* Optional: Add subtle backdrop shadow in dark mode */
[data-theme="dark"] .modal-backdrop.show {
  opacity: 0.85;
  background-color: #000000;
}
</style>

<!-- Full Image Modal -->
<div class="modal fade" id="imageModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content modal-theme bg-transparent border-0">
      <div class="modal-body p-0 text-center">
        <img id="modalImage" src="" class="img-fluid rounded" alt="Full Image">
      </div>
      <button type="button" class="btn-close position-absolute top-0 end-0 m-3" data-bs-dismiss="modal" aria-label="Close"></button>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const modalImage = document.getElementById('modalImage');
  
  document.querySelectorAll('.gallery-clickable').forEach(img => {
    img.addEventListener('click', function() {
      const fullSrc = this.getAttribute('data-bs-fullsrc');
      modalImage.src = fullSrc;
    });
  });
});
</script>
