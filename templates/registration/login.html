{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
/* ── Shared Auth Tokens ──────────────────────────────────────── */
:root {
  --a-primary:   #1a56db;
  --a-primary-d: #1446b8;
  --a-accent:    #6366f1;
  --a-surface:   #ffffff;
  --a-bg:        #f0f4ff;
  --a-text:      #0f172a;
  --a-muted:     #64748b;
  --a-border:    #e2e8f0;
  --a-danger:    #ef4444;
  --a-success:   #10b981;
  --a-radius:    14px;
  --a-font:      'DM Sans', sans-serif;
}
[data-theme="dark"] {
  --a-surface: #161b2c;
  --a-bg:      #0d1117;
  --a-text:    #e8edf8;
  --a-muted:   #7c8db5;
  --a-border:  rgba(255,255,255,0.08);
}

.auth-page {
  min-height: calc(100vh - 70px);
  display: flex; align-items: center; justify-content: center;
  padding: 2rem 1rem;
  background: linear-gradient(135deg, #0f2666 0%, #1a56db 55%, #0891b2 100%);
  position: relative; overflow: hidden;
}
.auth-page::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 60% 40%, rgba(99,102,241,0.25) 0%, transparent 60%);
  pointer-events: none;
}

.auth-card {
  background: var(--a-surface);
  border-radius: 22px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.3);
  width: 100%; max-width: 420px;
  overflow: hidden;
  position: relative; z-index: 1;
  animation: authSlideUp 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes authSlideUp {
  from { opacity:0; transform:translateY(28px) scale(0.96); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}

/* Header */
.auth-header {
  background: linear-gradient(135deg, #1a56db, #6366f1);
  padding: 2rem 2rem 1.5rem;
  text-align: center; color: #fff; position: relative; overflow: hidden;
}
.auth-header::after {
  content: '';
  position: absolute; top: -40%; right: -20%;
  width: 70%; height: 200%;
  background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, transparent 70%);
  pointer-events: none;
}
.auth-logo {
  width: 58px; height: 58px; border-radius: 14px;
  background: rgba(255,255,255,0.18);
  border: 1.5px solid rgba(255,255,255,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; margin: 0 auto 0.85rem;
}
.auth-header h2 {
  font-size: 1.4rem; font-weight: 800; margin: 0 0 4px;
}
.auth-header p {
  font-size: 0.78rem; opacity: 0.8; margin: 0;
}

/* Body */
.auth-body { padding: 1.75rem 2rem 2rem; }

/* Messages */
.auth-alerts { margin-bottom: 1rem; }
.auth-alert {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px; border-radius: 10px;
  font-size: 0.82rem; font-weight: 500; margin-bottom: 6px;
}
.auth-alert--error   { background: #fee2e2; color: #dc2626; border-left: 3px solid #dc2626; }
.auth-alert--success { background: #d1fae5; color: #059669; border-left: 3px solid #059669; }
.auth-alert--info    { background: #dbeafe; color: #1d4ed8; border-left: 3px solid #1d4ed8; }

/* Form */
.auth-field { margin-bottom: 1.1rem; }
.auth-label {
  display: flex; align-items: center; gap: 6px;
  font-size: 0.78rem; font-weight: 700;
  color: var(--a-text); margin-bottom: 6px;
  letter-spacing: 0.02em;
}
.auth-label i { color: var(--a-primary); font-size: 13px; }

.auth-input-wrap { position: relative; }
.auth-input {
  width: 100%; padding: 11px 14px;
  border: 1.5px solid var(--a-border);
  border-radius: var(--a-radius);
  font-size: 0.9rem; color: var(--a-text);
  background: var(--a-bg);
  font-family: var(--a-font);
  transition: border-color 0.2s, box-shadow 0.2s;
  outline: none;
}
.auth-input:focus {
  border-color: var(--a-primary);
  box-shadow: 0 0 0 3px rgba(26,86,219,0.1);
}
.auth-input.is-invalid { border-color: var(--a-danger); }
.auth-input.is-valid   { border-color: var(--a-success); }
.auth-input::placeholder { color: var(--a-muted); }

.pw-eye {
  position: absolute; right: 12px; top: 50%;
  transform: translateY(-50%);
  cursor: pointer; color: var(--a-muted);
  font-size: 16px; background: none; border: none; padding: 2px;
  transition: color 0.2s;
}
.pw-eye:hover { color: var(--a-primary); }

/* Forgot link */
.auth-forgot {
  text-align: right; margin-top: 4px;
}
.auth-forgot a {
  font-size: 0.73rem; color: var(--a-primary);
  text-decoration: none; font-weight: 600;
}
.auth-forgot a:hover { text-decoration: underline; }

/* Submit button */
.auth-btn {
  width: 100%; padding: 12px;
  background: linear-gradient(135deg, var(--a-primary), var(--a-accent));
  color: #fff; border: none; border-radius: 999px;
  font-size: 0.95rem; font-weight: 700;
  cursor: pointer; font-family: var(--a-font);
  box-shadow: 0 4px 16px rgba(26,86,219,0.3);
  transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  margin-top: 0.25rem;
}
.auth-btn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(26,86,219,0.4);
}
.auth-btn:disabled { opacity: 0.6; cursor: not-allowed; }

/* Footer link */
.auth-switch {
  text-align: center; margin-top: 1.25rem;
  padding-top: 1.25rem;
  border-top: 1px solid var(--a-border);
  font-size: 0.8rem; color: var(--a-muted);
}
.auth-switch a {
  color: var(--a-primary); font-weight: 700; text-decoration: none;
}
.auth-switch a:hover { text-decoration: underline; }

/* Strength bar */
.strength-wrap { margin-top: 6px; }
.strength-bar  { height: 3px; background: var(--a-border); border-radius: 2px; overflow: hidden; }
.strength-fill { height: 100%; width: 0; transition: width 0.3s, background 0.3s; }
.strength-txt  { font-size: 0.65rem; color: var(--a-muted); margin-top: 3px; }

/* Terms */
.auth-terms {
  display: flex; align-items: flex-start; gap: 8px;
  margin: 0.75rem 0;
}
.auth-terms input { margin-top: 2px; accent-color: var(--a-primary); cursor: pointer; }
.auth-terms label { font-size: 0.73rem; color: var(--a-muted); line-height: 1.5; }
.auth-terms a { color: var(--a-primary); font-weight: 600; }
</style>

<div class="auth-page">
  <div class="auth-card">

    <!-- Header -->
    <div class="auth-header">
      <div class="auth-logo">🏫</div>
      <h2>Welcome Back</h2>
      <p>Sign in to CLE BCA College</p>
    </div>

    <!-- Body -->
    <div class="auth-body">

      <!-- Django messages -->
      {% if messages %}
      <div class="auth-alerts">
        {% for msg in messages %}
        <div class="auth-alert auth-alert--{{ msg.tags|default:'info' }}">
          <i class="bi bi-{% if msg.tags == 'success' %}check-circle-fill{% elif msg.tags == 'error' %}exclamation-triangle-fill{% else %}info-circle-fill{% endif %}"></i>
          {{ msg }}
        </div>
        {% endfor %}
      </div>
      {% endif %}

      <form method="post" action="{% url 'login' %}">
        {% csrf_token %}

        <!-- Email -->
        <div class="auth-field">
          <label class="auth-label"><i class="bi bi-envelope"></i> Email Address</label>
          <input type="email" name="username" class="auth-input"
                 placeholder="you@example.com"
                 value="{{ request.POST.username }}" required autofocus>
        </div>

        <!-- Password -->
        <div class="auth-field">
          <label class="auth-label"><i class="bi bi-lock"></i> Password</label>
          <div class="auth-input-wrap">
            <input type="password" name="password" id="loginPw" class="auth-input"
                   placeholder="Enter your password" required>
            <button type="button" class="pw-eye" onclick="togglePw('loginPw',this)">
              <i class="bi bi-eye-slash"></i>
            </button>
          </div>
        </div>

        <!-- Forgot -->
        <div class="auth-forgot">
          <a href="{% url 'password_reset' %}">Forgot password?</a>
        </div>

        <button type="submit" class="auth-btn" style="margin-top:1rem;">
          <i class="bi bi-box-arrow-in-right"></i> Sign In
        </button>
      </form>

      <div class="auth-switch">
        Don't have an account? <a href="{% url 'signup' %}">Create Account</a>
      </div>

    </div>
  </div>
</div>

<script>
function togglePw(id, btn) {
  var f = document.getElementById(id);
  var isPass = f.type === 'password';
  f.type = isPass ? 'text' : 'password';
  btn.querySelector('i').className = isPass ? 'bi bi-eye' : 'bi bi-eye-slash';
}
</script>
{% endblock %}
